name: CI - Test and Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: pytest -q tests

      - name: Deploy to Cloudflare
        if: success() && startsWith(github.ref, 'refs/heads/')
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -z "$CF_DEPLOY_HOOK" ]; then
            echo "::error::CF_DEPLOY_HOOK secret is not set. Set it to your Cloudflare deploy webhook.";
            exit 1;
          fi
          echo "Triggering Cloudflare deploy webhook..."
          curl -sSf -X POST "$CF_DEPLOY_HOOK" -H "Content-Type: application/json" -d '{"ref":"'"${{ github.ref }}"'","sha":"'"${{ github.sha }}"'"}'
