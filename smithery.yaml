name: easy-predict
description: >
  Predict the next value in a numeric time series or detect anomalies via z-score.
  Paid per-call at $0.01 USDC on Base using x402 v2 micropayments.
  Your private key stays on your machine — only the signed payment header is sent.
version: 1.0.0
homepage: https://easy-predict.com
license: MIT

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      walletPrivateKey:
        type: string
        title: Wallet Private Key
        description: >
          Hex private key of a Base (eip155:8453) wallet holding USDC.
          Stays on your machine — only the signed payment header is sent to the API.
          Each tool call costs $0.01 USDC via x402.
        x-sensitive: true
    required:
      - walletPrivateKey
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["easy-predict-mcp"],
      env: {
        WALLET_PRIVATE_KEY: config.walletPrivateKey
      }
    })
